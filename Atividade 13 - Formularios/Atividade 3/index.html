<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>
    <form action="server.php" method="post">
        <label for="numero">Digite o primeiro número:</label>
        <input type="number" name="numero1" required> <br>
        <label for="numero">Digite o segundo número:</label>
        <input type="number" name="numero2" required> <br>

        <input type="radio" name="operador" value="Adição" required>
        <label for="operador">Adição</label> <br>
        <input type="radio" name="operador" value="Subtração">
        <label for="operador">Subtração</label> <br>
        <input type="radio" name="operador" value="Multiplicação">
        <label for="operador">Multiplicação</label> <br>
        <input type="radio" name="operador" value="Divisão">
        <label for="operador">Divisão</label> <br>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
